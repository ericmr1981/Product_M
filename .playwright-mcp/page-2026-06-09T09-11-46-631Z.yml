          - heading "杯具预冷 5 分钟" [level=3] [ref=e80]
          - paragraph [ref=e81]: 取 500ml 透明杯，放入 -18℃ 冷柜预冷 5 分钟，避免打制后温度回升导致分层塌陷。
      - listitem [ref=e82]:
        - generic [ref=e83]: "02"
        - generic [ref=e84]:
          - heading "下层打制" [level=3] [ref=e85]
          - paragraph [ref=e86]: 北海道牛乳 gelato 90g + 冷冻芒果酱 50g + 部分鲜牛奶，高速打 15 秒至顺滑挂壁。
      - listitem [ref=e87]:
        - generic [ref=e88]: "03"
        - generic [ref=e89]:
          - heading "沿杯壁缓慢倒入下层" [level=3] [ref=e90]
          - paragraph [ref=e91]: 下层约占杯体 2/3，沿杯壁缓慢倒入，避免冲破未来上层的分界面。
      - listitem [ref=e92]:
        - generic [ref=e93]: "04"
        - generic [ref=e94]:
          - heading "上层打制" [level=3] [ref=e95]
          - paragraph [ref=e96]: 荔枝味 gelato 50g + 剩余鲜牛奶，高速打 15 秒；打制完成后撒入海盐颗粒 0.2g。
      - listitem [ref=e97]:
        - generic [ref=e98]: "05"
        - generic [ref=e99]:
          - heading "顶部装饰" [level=3] [ref=e100]
          - paragraph [ref=e101]: 挤奶油 8g，放鲜芒果肉 5g，置 mini gelato 球 1 颗，点缀薄荷叶 1 片。
