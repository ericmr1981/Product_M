    - paragraph [ref=e53]: 03 — THE POD
    - generic [ref=e54]:
      - figure [ref=e55]:
        - img "Madagascar vanilla pods laid on a stone surface" [ref=e56]
      - generic [ref=e57]:
        - heading "From Sava, by hand" [level=2] [ref=e58]
        - paragraph [ref=e59]: We source only from the Sava region of northeastern Madagascar, where the Bourbon variety was first cultivated. Pods are hand-picked at peak ripeness, sun-cured for three months, and graded by weight before shipping. We reject roughly a third on arrival.
  - generic [ref=e60]:
    - paragraph [ref=e61]: 04 — METHOD
    - list [ref=e62]:
      - listitem [ref=e63]:
        - generic [ref=e64]: "01"
        - generic [ref=e65]:
          - heading "Split and scrape" [level=3] [ref=e66]
          - paragraph [ref=e67]: Each pod is split lengthwise; the seeds are scraped and reserved. The empty pods go into cold cream.
      - listitem [ref=e68]:
        - generic [ref=e69]: "02"
        - generic [ref=e70]:
          - heading "Steep" [level=3] [ref=e71]
          - paragraph [ref=e72]: Cream and pods steep together for 72 hours at 4°C. The seeds are added in the final 12 hours.
      - listitem [ref=e73]:
        - generic [ref=e74]: "03"
        - generic [ref=e75]:
          - heading "Strain and churn" [level=3] [ref=e76]
          - paragraph [ref=e77]: The cream is strained through fine mesh. The base is churned slowly at -2°C for 25 minutes — half the speed of a standard batch.
      - listitem [ref=e78]:
        - generic [ref=e79]: "04"
        - generic [ref=e80]:
          - heading "Rest" [level=3] [ref=e81]
          - paragraph [ref=e82]: The finished gelato rests in the hardening cabinet for at least 6 hours before service.
